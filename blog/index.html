<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AERA · Blog — Vista de Cima</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #F8FAFE; }
  body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
  ::selection { background: #1877F230; }
  button, input, textarea { font-family: inherit; }
  a { color: inherit; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="/blog/design-canvas.jsx"></script>
<script type="text/babel" src="/blog/tweaks-panel.jsx"></script>
<script type="text/babel" src="/blog/blog-shared.jsx"></script>
<script type="text/babel" src="/blog/blog-home-cinema.jsx"></script>
<script type="text/babel" src="/blog/blog-home-editorial.jsx"></script>
<script type="text/babel" src="/blog/blog-post.jsx"></script>
<script type="text/babel" src="/blog/blog-search.jsx"></script>

<script type="text/babel">
function App() {
  const [view, setView] = React.useState({ name: 'home' });
  const [postId, setPostId] = React.useState('');

  // Permite abrir um post a partir de links sugeridos no final da página
  React.useEffect(() => {
    window.openPost = (id) => { setPostId(id); setView({ name: 'post' }); window.scrollTo(0, 0); };
  }, []);

  const openPost = (id) => { setPostId(id); setView({ name: 'post' }); window.scrollTo(0, 0); };
  const openSearch = () => setView({ name: 'search' });
  const back = () => setView({ name: 'home' });

  // Controle de navegação do site
  if (view.name === 'post') return <PostPage postId={postId} onBack={back} />;
  if (view.name === 'search') return <SearchPage onClose={back} onOpenPost={openPost} />;

  // Tela Inicial (Horizonte Cinematográfico)
  return <HomeCinema onOpenPost={openPost} onOpenSearch={openSearch} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
